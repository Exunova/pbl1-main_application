appId: com.mapro.app
productName: MAPRO
directories:
  buildResources: build
files:
  - electron/**
  - src/**
  - "!**/.gitignore"
extraResources:
  - from: server
    to: server
    filter:
      - "**/*"
  - from: resources
    to: resources
    filter:
      - "**/*"
asar: true
win:
  target:
    - target: nsis
      arch:
        - x64
mac:
  target:
    - target: dmg
      arch:
        - x64
linux:
  target:
    - AppImage